ll: rgb(15, 23, 42); fill-opacity: 1; white-space: pre;"><tspan class="line" dy="0em" x="123.609375" y="20"><tspan style="font-weight:bold">Mayo y junio</tspan></tspan><tspan class="line" dy="1.3em" x="123.609375" y="20"></tspan><tspan class="line" dy="2.6em" x="123.609375" y="20">Retención del uso ≥5 días:</tspan><tspan class="line" dy="3.9000000000000004em" x="123.609375" y="20">Secundaria -18,4 pp</tspan><tspan class="line" dy="5.2em" x="123.609375" y="20">UTU -12,7 pp</tspan></text></g></g></g><g class="annotation" data-index="4" style="opacity: 1;"><g class="annotation-text-g" transform="rotate(0,1222.9,261.5)"><g class="cursor-pointer" transform="translate(1141,246)"><rect class="bg" x="0.5" y="0.5" width="163" height="30" style="stroke-width: 1px; stroke: rgb(0, 0, 0); stroke-opacity: 0; fill: rgb(0, 0, 0); fill-opacity: 0;"/><text class="annotation-text" text-anchor="middle" x="81.859375" y="24.0107421875" style="font-family: 'Open Sans', verdana, arial, sans-serif; font-size: 22px; fill: rgb(22, 163, 74); fill-opacity: 1; white-space: pre;"><tspan style="font-weight:bold">3. RELACIÓN</tspan></text></g></g></g><g class="annotation" data-index="5" style="opacity: 1;"><g class="annotation-text-g" transform="rotate(0,1158.9,425.40000000000003)"><g class="cursor-pointer" transform="translate(1013,365)"><rect class="bg" x="0.5" y="0.5" width="291" height="119" style="stroke-width: 1px; stroke: rgb(0, 0, 0); stroke-opacity: 0; fill: rgb(0, 0, 0); fill-opacity: 0;"/><text class="annotation-text" text-anchor="middle" x="146.2265625" y="20" style="font-family: 'Open Sans', verdana, arial, sans-serif; font-size: 18px; fill: rgb(15, 23, 42); fill-opacity: 1; white-space: pre;"><tspan class="line" dy="0em" x="146.2265625" y="20"><tspan style="font-weight:bold">Actividad docente del centro</tspan></tspan><tspan class="line" dy="1.3em" x="146.2265625" y="20"></tspan><tspan class="line" dy="2.6em" x="146.2265625" y="20">Correlación mayo-junio:</tspan><tspan class="line" dy="3.9000000000000004em" x="146.2265625" y="20">Secundaria r=0,43</tspan><tspan class="line" dy="5.2em" x="146.2265625" y="20">UTU r=0,43</tspan></text></g></g></g><g class="annotation" data-index="6" style="opacity: 1;"><g class="annotation-text-g" transform="rotate(0,800,700)"><g class="cursor-pointer" transform="translate(-74,686)"><rect class="bg" x="0.5" y="0.5" width="1747" height="27" style="stroke-width: 1px; stroke: rgb(0, 0, 0); stroke-opacity: 0; fill: rgb(0, 0, 0); fill-opacity: 0;"/><text class="annotation-text" text-anchor="middle" x="874.1015625" y="22" style="font-family: 'Open Sans', verdana, arial, sans-serif; font-size: 20px; fill: rgb(15, 23, 42); fill-opacity: 1; white-space: pre;"><tspan style="font-weight:bold">Lectura integrada:</tspan> la caída de CREA se comporta como una pérdida de continuidad institucional del uso, concentrada en educación media y profundizada después de abril.</text></g></g></g><g class="annotation" data-index="7" style="opacity: 1;"><g class="annotation-text-g" transform="rotate(0,800,797.1)"><g class="cursor-pointer" transform="translate(388,787)"><rect class="bg" x="0.5" y="0.5" width="823" height="20" style="stroke-width: 1px; stroke: rgb(0, 0, 0); stroke-opacity: 0; fill: rgb(0, 0, 0); fill-opacity: 0;"/><text class="annotation-text" text-anchor="middle" x="411.7734375" y="16" style="font-family: 'Open Sans', verdana, arial, sans-serif; font-size: 14px; fill: rgb(100, 116, 139); fill-opacity: 1; white-space: pre;"><tspan style="font-style:italic">Limitación:</tspan> Precedencia temporal no robusta en Secundaria (p=0,302); en UTU la señal fue exploratoria (p=0,069).</text></g></g></g></g></svg>